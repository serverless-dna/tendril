name: Quality Gate

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  check:
    name: Format, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            tendril-agent/package-lock.json
            tendril-ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tendril-ui/src-tauri

      - name: Install dependencies
        run: make install

      - name: Quality gate (fmt + lint + test)
        run: make check
